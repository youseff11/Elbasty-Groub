{% extends 'base.html' %}
{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    :root { --navy: #0a192f; --neon: #64ffda; --gold: #ffd700; --slate: #8892b0; --white: #e6f1ff; --card-bg: #112240; --border: rgba(100,255,218,0.15); --danger: #ff4d4d; --success: #00c853; }
    body { background: var(--navy); color: var(--white); font-family: 'Cairo', sans-serif; }
    .page-wrap { max-width: 680px; margin: 40px auto; padding: 0 20px 60px; }
    .form-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 30px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 14px; font-weight: 600; color: var(--slate); margin-bottom: 7px; }
    input, select, textarea { width: 100%; padding: 11px 14px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(100,255,218,0.2); color: var(--white); font-family: 'Cairo', sans-serif; font-size: 14px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--neon); }
    select option { background: #112240; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #00c853, #00a040); color: #fff; border: none; border-radius: 10px; font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
</style>
<div class="page-wrap">
    <a href="{% url 'receivables_list' %}" style="color:var(--slate);text-decoration:none;font-size:14px;margin-bottom:15px;display:inline-block;"><i class="fas fa-arrow-right"></i> رجوع</a>
    <div style="font-size:22px;font-weight:900;margin-bottom:20px;"><i class="fas fa-plus" style="color:#00c853;margin-left:10px;"></i> إضافة مديونية عميل</div>
    <div class="form-card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group"><label>اسم العميل *</label><input type="text" name="customer_name" required placeholder="اسم العميل"></div>
                <div class="form-group"><label>رقم الهاتف</label><input type="text" name="customer_phone" placeholder="01xxxxxxxxx"></div>
            </div>
            <div class="form-group"><label>البيان / الوصف</label><textarea name="description" rows="2" placeholder="وصف المديونية..."></textarea></div>
            <div class="form-row">
                <div class="form-group"><label>إجمالي المبلغ (ج) *</label><input type="number" name="total_amount" min="0" step="0.01" required placeholder="0.00"></div>
                <div class="form-group"><label>المبلغ المدفوع (ج)</label><input type="number" name="amount_paid" min="0" step="0.01" placeholder="0.00" value="0"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>تاريخ المديونية *</label><input type="date" name="date" required value="{{ today }}"></div>
                <div class="form-group"><label>تاريخ الاستحقاق</label><input type="date" name="due_date"></div>
            </div>
            <div class="form-group"><label>ملاحظات</label><textarea name="notes" rows="2" placeholder="ملاحظات إضافية..."></textarea></div>
            <button type="submit" class="submit-btn"><i class="fas fa-save"></i> حفظ المديونية</button>
        </form>
    </div>
</div>
{% endblock %}
