<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | الباسطى جروب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        /* ألوان الهوية السيبرانية */
        --bg-dark: #020617;
        --bg-panel: #0f172a;
        --neon-blue: #00e5ff;
        --cyber-neon: #64ffda;
        --text-main: #ffffff;
        --text-sec: #94a3b8;
        --glass-border: rgba(0, 229, 255, 0.15);
        --trans-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        
        --font-arabic: 'Cairo', sans-serif;
        --font-english: 'Rajdhani', sans-serif;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        background-color: var(--bg-dark);
        /* شبكة ليزر تقنية في الخلفية */
        background-image: 
            linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
        background-size: 30px 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: var(--text-main);
        font-family: var(--font-arabic);
        overflow: hidden;
    }

    /* --- حاوية تسجيل الدخول (Cyber Box) --- */
    .auth-box {
        width: 100%;
        max-width: 450px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid var(--glass-border);
        position: relative;
        padding: 60px 45px;
        backdrop-filter: blur(15px);
        border-radius: 12px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* زخرفة علوية متوهجة */
    .auth-box::before {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 3px;
        background: var(--neon-blue);
        box-shadow: 0 0 15px var(--neon-blue);
        border-radius: 0 0 5px 5px;
    }

    .auth-content h1 {
        font-family: var(--font-english);
        text-align: center;
        margin-bottom: 10px;
        font-size: 2.8rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #fff;
    }

    .auth-content p {
        text-align: center;
        margin-bottom: 45px;
        color: var(--cyber-neon);
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .input-group {
        margin-bottom: 30px;
        position: relative;
    }

    .input-group label {
        display: block;
        margin-bottom: 10px;
        font-size: 12px;
        font-weight: 700;
        color: var(--neon-blue);
        text-transform: uppercase;
        letter-spacing: 1px;
        text-align: right;
    }

    .input-group input {
        width: 100%;
        padding: 15px;
        background: rgba(2, 6, 23, 0.6);
        border: 1px solid var(--glass-border);
        outline: none;
        font-size: 15px;
        color: var(--text-main);
        transition: var(--trans-smooth);
        border-radius: 6px;
        text-align: right;
        font-family: inherit;
    }

    .input-group input:focus {
        border-color: var(--neon-blue);
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        background: rgba(15, 23, 42, 0.9);
    }

    .btn {
        width: 100%;
        padding: 18px;
        background: transparent;
        color: var(--neon-blue);
        border: 1px solid var(--neon-blue);
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: var(--trans-smooth);
        margin-top: 10px;
        border-radius: 6px;
        font-family: var(--font-arabic);
    }

    .btn:hover {
        background: var(--neon-blue);
        color: var(--bg-dark);
        box-shadow: 0 0 25px rgba(0, 229, 255, 0.5);
        transform: translateY(-3px);
    }

    .auth-footer {
        text-align: center;
        margin-top: 40px;
        font-size: 14px;
        color: var(--text-sec);
        font-weight: 600;
    }

    .auth-footer a {
        color: var(--neon-blue);
        text-decoration: none;
        font-weight: 800;
        margin-right: 5px;
        transition: 0.3s;
    }

    .auth-footer a:hover {
        color: #fff;
        text-shadow: 0 0 10px var(--neon-blue);
    }

    .forgot-pass {
        display: block;
        text-align: left; /* بما أن الاتجاه عربي يفضل وضعها لليسار */
        font-size: 12px;
        color: var(--text-sec);
        text-decoration: none;
        margin-top: -20px;
        margin-bottom: 30px;
        transition: 0.3s;
        font-weight: 600;
    }

    .forgot-pass:hover {
        color: var(--neon-blue);
    }

    /* أيقونة حماية كخلفية خفيفة */
    .bg-icon {
        position: absolute;
        font-size: 15rem;
        color: rgba(0, 229, 255, 0.02);
        z-index: 1;
        bottom: -20px;
        right: -20px;
        pointer-events: none;
    }
</style>
</head>

<body dir="rtl">

<div class="auth-box">
    <i class="fas fa-shield-halved bg-icon"></i>
    
    <div class="auth-content">
        <h1>LOGIN</h1>
        <p>الوصول الآمن للأنظمة</p>

        <form method="post">
            {% csrf_token %}

            <div class="input-group">
                <label><i class="fas fa-user-shield" style="margin-left: 8px;"></i> اسم المستخدم</label>
                <input type="text" name="username" placeholder="أدخل اسم المستخدم الخاص بك" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-lock" style="margin-left: 8px;"></i> كلمة المرور</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <a href="#" class="forgot-pass">نسيت كلمة المرور؟</a>

            <button class="btn">تسجيل الدخول الآمن</button>
        </form>

        <div class="auth-footer">
            ليس لديك تصريح وصول؟
            <a href="{% url 'signup' %}">إنشاء حساب جديد</a>
        </div>
    </div>
</div>

</body>
</html>
